name: Deploy to GitHub Pages

on:
  # 當推送至 main 或 master 分支時觸發
  push:
    branches:
      - main
      - master
  # 允許從 Actions 標籤手動執行此工作流程
  workflow_dispatch:

# 設定 GITHUB_TOKEN 的權限以允許部署至 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 允許並行部署，跳過執行中以及排隊中的部署作業，並取消正在執行中的部署。
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  # 單一部署工作
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上傳 Vite 建置出來的 dist 資料夾
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
